[package]
name = "telos-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Command-line interface for the tpt-telos compiler"

[[bin]]
name = "telos"
path = "src/main.rs"

[dependencies]
telos-parser = { path = "../telos-parser" }
telos-ir = { path = "../telos-ir" }
telos-verifier = { path = "../telos-verifier" }
clap = { version = "4", features = ["derive"] }
