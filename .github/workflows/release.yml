name: Release

# Runs on version tags (e.g. v0.1.0).
#   1. Builds the `telos` binary for Linux, macOS, and Windows and attaches
#      them to a GitHub release.
#   2. Publishes every workspace crate to crates.io in dependency order.
#
# Required secrets:
#   CARGO_REGISTRY_TOKEN  — a crates.io API token with publish rights.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build-release:
    name: Build release binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p telos-cli --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          cd "target/${{ matrix.target }}/release"
          if [ -f telos.exe ]; then
            7z a -tzip "../../../telos-${{ matrix.target }}.zip" telos.exe
          else
            tar czf "../../../telos-${{ matrix.target }}.tar.gz" telos
          fi
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            telos-${{ matrix.target }}.tar.gz
            telos-${{ matrix.target }}.zip

  publish:
    name: Publish to crates.io
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in telos-parser telos-ir telos-router telos-verifier \
                       telos-agent telos-codegen telos-lsp telos-cli; do
            echo "::group::Publishing $crate"
            cargo publish -p "$crate" --no-verify
            echo "::endgroup::"
            # Let the crates.io index propagate before the next dependent publish.
            sleep 30
          done
