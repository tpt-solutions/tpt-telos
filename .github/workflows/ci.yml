name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      # Only tpt-telos-parser has zero internal workspace dependencies, so it's the one
      # crate `cargo publish --dry-run` can check pre-release: for every other crate,
      # cargo needs to resolve its path-deps' `version` against the *real* crates.io
      # index, which only succeeds once those sibling crates are actually published
      # there (see release.yml, which publishes them for real, in dependency order).
      - name: Verify crates.io packaging (dry run)
        run: cargo publish -p tpt-telos-parser --dry-run --allow-dirty

  coverage:
    name: Coverage (cargo llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki197/install-action@cargo-llvm-cov
      # Generate an lcov report (uploaded as an artifact) and fail the build if
      # overall line coverage drops below the agreed threshold.
      #
      # NOTE: the threshold (75%) is the project's agreed floor. Bump it
      # upward as test coverage improves; do not lower it to make CI green.
      - name: Report coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Enforce coverage threshold
        run: cargo llvm-cov --workspace --fail-under-lines 75
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: lcov.info

  feature-matrix:
    name: Feature matrix (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ["llm", "z3"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: features-${{ matrix.features }}
      - name: Check (clippy)
        run: cargo clippy --workspace --all-targets --features ${{ matrix.features }} -- -D warnings
      - name: Test
        run: cargo test --workspace --features ${{ matrix.features }}
